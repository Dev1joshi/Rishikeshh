<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rishikesh Countdown</title>

<link rel="stylesheet" href="c.css">

</head>

<body class="tripPage">



<div class="tripOverlay">

<h1 class="tripTitle">RISHIKESH COUNTDOWN 🌄</h1>

<div class="countdown">

<div class="timeCard">
<span id="days">0</span>
<p>DAYS</p>
</div>

<div class="timeCard">
<span id="hours">0</span>
<p>HOURS</p>
</div>

<div class="timeCard">
<span id="minutes">0</span>
<p>MINUTES</p>
</div>

<div class="timeCard">
<span id="seconds">0</span>
<p>SECONDS</p>
</div>

</div>

</div>
<section class="readySection">

    <h2 class="readyTitle">Are You Ready?  🌄</h2>
    
    <p class="readyText">
    paise bacha aur hehe abhi nahi hui final bss aese hi!
    </p>
    
    <button class="tripButton"
    onclick="window.open('https://www.youtube.com/watch?v=ddxgPIzvc-U&t=74s','_blank')">
    LET'S GO 🚀
    </button>
    
    </section>

<section class="gallery">

    <img src="images/r0.png">
    <img src="images/r1.png">
    <img src="images/r2.png">
    <img src="images/r3.png">
    <img src="images/r4.png">
    <img src="images/r5.png">

</section>

<script src="script.js"></script>

</body>
</html>
